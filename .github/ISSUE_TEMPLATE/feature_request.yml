name: Feature request
description: Suggest a new data tool, source, or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do that EdgarMCP doesn't support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What tool, data source, or behavior would you like to see?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: input
    id: source
    attributes:
      label: Data source (if applicable)
      description: If this involves a new source, which one — and what are its terms/limits?
    validations:
      required: false
